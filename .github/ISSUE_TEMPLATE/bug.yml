name: Bug report
description: Report a defect
title: 'fix: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Problem description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, Node version
  - type: textarea
    id: logs
    attributes:
      label: Console, network, or logs
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
  - type: textarea
    id: regression
    attributes:
      label: Regression test requirement
